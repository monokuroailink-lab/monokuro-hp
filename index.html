<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モノクロ。</title>
    <style>
        :root {
            --img-omote: url('assets/images/fv-omote.png');
            --img-ura: url('assets/images/fv-ura.png');
        }
        body, html { margin: 0; padding: 0; background: #f0f0f0; overflow-x: hidden; }

        /* Container keeping 1440:900 ratio */
        .fv-container { 
            position: relative; width: 100%; padding-top: 62.5%; 
            background: #f0f0f0; overflow: hidden;
        }

        /* Base Layer */
        .glitch-layer {
            position: absolute; inset: 0;
            background-size: cover; background-position: center top;
            background-image: var(--img-omote);
        }

        /* Glitch Overlays (Hidden by default) */
        .glitch-overlay {
            position: absolute; inset: 0;
            background-size: cover; background-position: center top;
            background-image: inherit;
            display: none;
            mix-blend-mode: screen;
        }

        /* 3-layer RGB Split / Slice Effect */
        .glitch-active .glitch-overlay { display: block; }
        
        .glitch-active .glitch-overlay:nth-child(2) {
            animation: glitch-anim-1 0.2s infinite;
            filter: grayscale(100%) brightness(2) contrast(150%) sepia(100%) hue-rotate(0deg) saturate(1000%);
            opacity: 0.8;
        }
        .glitch-active .glitch-overlay:nth-child(3) {
            animation: glitch-anim-2 0.15s infinite;
            filter: grayscale(100%) brightness(2) contrast(150%) sepia(100%) hue-rotate(180deg) saturate(1000%);
            opacity: 0.8;
            mix-blend-mode: color-dodge;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(-20px, 10px); }
            20% { clip-path: inset(50% 0 30% 0); transform: translate(20px, -10px); }
            40% { clip-path: inset(20% 0 60% 0); transform: translate(-10px, 0); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(15px, 15px); }
            100% { clip-path: inset(0 0 0 0); transform: translate(0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(40% 0 40% 0); transform: translate(25px, -10px); }
            25% { clip-path: inset(10% 0 10% 0); transform: translate(-25px, 10px); }
            50% { clip-path: inset(70% 0 20% 0); transform: translate(10px, -20px); }
            75% { clip-path: inset(20% 0 70% 0); transform: translate(-10px, 20px); }
            100% { clip-path: inset(0 0 0 0); transform: translate(0); }
        }

        /* Flash Layer */
        #flash {
            position: fixed; inset: 0; background: #fff; z-index: 99; display: none; mix-blend-mode: difference;
        }

        .click-area {
            position: absolute; top: 4%; left: 7%; width: 18%; height: 10%;
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body class="mode-omote">
    <div id="flash"></div>
    <div class="fv-container">
        <div class="click-area" onclick="handleTap()"></div>
        <!-- Glitch Layers -->
        <div class="glitch-layer">
            <div class="glitch-overlay"></div>
            <div class="glitch-overlay"></div>
        </div>
    </div>

    <script>
        let taps = 0, timer, isUra = false;
        const container = document.querySelector('.glitch-layer');
        const flash = document.getElementById('flash');
        
        // Web Audio Context for generating 'jiji' sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playGlitchSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const duration = 0.25;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            // Rougher white noise
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // Harsh Bandpass Filter for metallic/digital crunch
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = isUra ? 1200 : 3000;
            filter.Q.value = 5;

            // CRITICAL: High-frequency stutter for 'JIJIJI' texture
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, now);
            
            // Repeat rapid ON/OFF to create 'jiji' staccato
            const stutterSpeed = 0.015; // very fast gaps
            for(let t=0; t<duration; t+=stutterSpeed) {
                gain.gain.setValueAtTime(Math.random() * 0.4 + 0.2, now + t);
                gain.gain.setValueAtTime(0, now + t + stutterSpeed/2);
            }
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start();
        }

        function toggle() {
            playGlitchSound();
            document.body.classList.add('glitch-active');
            flash.style.display = 'block';

            setTimeout(() => {
                isUra = !isUra;
                container.style.backgroundImage = isUra ? 'var(--img-ura)' : 'var(--img-omote)';
                document.body.style.background = isUra ? '#000' : '#f0f0f0';
                
                setTimeout(() => {
                    document.body.classList.remove('glitch-active');
                    flash.style.display = 'none';
                }, 200);
            }, 100);
        }

        function handleTap() {
            taps++;
            clearTimeout(timer);
            if (taps === 3) { toggle(); taps = 0; }
            else { timer = setTimeout(() => taps = 0, 500); }
        }

        const code = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
        let idx = 0;
        document.addEventListener('keydown', (e) => {
            const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
            if (key === code[idx]) {
                idx++;
                if (idx === code.length) { toggle(); idx = 0; }
            } else { idx = 0; }
        });
    </script>
</body>
</html>
